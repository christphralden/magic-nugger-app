name: magic-nugger

services:
  magic-nugger-postgres:
    build:
      context: ./db
      dockerfile: Dockerfile
    container_name: magic-nugger-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-magic_nugger}
      APP_USER: ${APP_USER}
      APP_USER_PASSWORD: ${APP_USER_PASSWORD}
      APP_RO_USER: ${APP_RO_USER}
      APP_RO_PASSWORD: ${APP_RO_PASSWORD}
      PARTMAN_PASSWORD: ${PARTMAN_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${APP_USER} -d ${POSTGRES_DB:-magic_nugger}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
    shm_size: 256mb
    command: >
      postgres
      -c log_min_duration_statement=1000
      -c max_connections=200
      -c shared_preload_libraries='pg_partman_bgw'
      -c pg_partman_bgw.interval=3600
      -c pg_partman_bgw.role=partman_user
      -c pg_partman_bgw.dbname=${POSTGRES_DB:-magic_nugger}

  magic-nugger-web-server:
    container_name: magic-nugger-web-server
    build:
      context: .
      dockerfile: web-server/Dockerfile
      tags:
        - magic-nugger-web-server:latest
    environment:
      NODE_ENV: ${NODE_ENV}
      POSTGRES_HOST: magic-nugger-postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-magic_nugger}
      DATABASE_URL: ${DATABASE_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
      PORT: ${PORT:-3000}
      RPM_LIMIT: ${RPM_LIMIT:-3000}
      DB_POOL_MAX: ${DB_POOL_MAX:-20}
      DB_POOL_IDLE_TIMEOUT_MS: ${DB_POOL_IDLE_TIMEOUT_MS:-30000}
      DB_POOL_CONNECTION_TIMEOUT_MS: ${DB_POOL_CONNECTION_TIMEOUT_MS:-5000}
      DB_QUERY_TIMEOUT_MS: ${DB_QUERY_TIMEOUT_MS:-30000}
      DB_SSL_MODE: ${DB_SSL_MODE:-prefer}
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      magic-nugger-postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --quiet --tries=1 --spider http://127.0.0.1:3000/health || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  magic-nugger-cron:
    build:
      context: ./db/cron
    container_name: magic-nugger-cron
    environment:
      APP_USER: ${APP_USER}
      APP_USER_PASSWORD: ${APP_USER_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-magic_nugger}
      POSTGRES_HOST: magic-nugger-postgres
      GAME_SESSION_RESUME_WINDOW_MS: ${GAME_SESSION_RESUME_WINDOW_MS:-1800000}
    depends_on:
      magic-nugger-postgres:
        condition: service_healthy
    volumes:
      - ./db/cron/crontab:/app/crontab:ro
      - ./db/cron/game-session-cleanup.mjs:/app/game-session-cleanup.mjs:ro
      - ./db/cron/log-event.mjs:/app/log-event.mjs:ro
      - ./db/cron/backup.sh:/app/backup.sh:ro
      - ./db/backups:/backups
    command: sh -c "crontab /app/crontab && crond -f -d 8"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
    name: magic-nugger-postgres-data
