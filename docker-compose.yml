services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-magic_nugger}
      APP_USER: ${APP_USER}
      APP_USER_PASSWORD: ${APP_USER_PASSWORD}
      APP_RO_USER: ${APP_RO_USER}
      APP_RO_PASSWORD: ${APP_RO_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-magic_nugger}"]
      interval: 5s
      timeout: 5s
      retries: 5
    shm_size: 256mb
    command: >
      postgres
      -c log_min_duration_statement=1000
      -c max_connections=200

  server:
    build:
      context: ./web-server
      dockerfile: Dockerfile
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${APP_USER}:${APP_USER_PASSWORD}@postgres:5432/${POSTGRES_DB:-magic_nugger}
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
