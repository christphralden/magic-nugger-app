name: Pull latest code
description: Clones the repo on first run, then hard-resets to origin/master on subsequent deploys.

inputs:
  host:
    required: true
  username:
    required: true
  ssh_key:
    required: true
  repo_url:
    required: true

runs:
  using: composite
  steps:
    - uses: appleboy/ssh-action@7eaf76671a0d7eec5d98ee897acda4f968735a17 # v1.2.0
      env:
        REPO_URL: ${{ inputs.repo_url }}
      with:
        host: ${{ inputs.host }}
        username: ${{ inputs.username }}
        key: ${{ inputs.ssh_key }}
        timeout: 60s
        envs: REPO_URL
        script: |
          set -euo pipefail
          if [ ! -d /magic-nugger/.git ]; then
            echo "==> cloning repo"
            git clone "$REPO_URL" /magic-nugger
          else
            echo "==> repo exists, fetching"
          fi
          cd /magic-nugger
          git fetch origin
          git reset --hard origin/master
          echo "==> at $(git rev-parse --short HEAD)"
