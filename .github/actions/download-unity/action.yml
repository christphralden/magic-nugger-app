name: Download Unity build
description: Downloads Unity WebGL release zip on the runner, extracts it, then SCPs the full Calculon directory to the nginx serve directory.

inputs:
  host:
    required: true
  username:
    required: true
  ssh_key:
    required: true
  gh_token:
    required: true
  repo:
    required: true
  tag:
    required: false
    default: latest

outputs:
  unity_checksum:
    description: SHA-256 of calculon.tar.gz
    value: ${{ steps.checksum.outputs.unity_checksum }}

runs:
  using: composite
  steps:
    - name: Download and extract Unity build
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.gh_token }}
      run: |
        set -euo pipefail
        gh release download ${{ inputs.tag }} \
          --repo ${{ inputs.repo }} \
          --pattern "calculon.tar.gz" \
          --dir unity-build/ \
          --clobber
        mkdir -p unity-extracted
        tar -xzf unity-build/calculon.tar.gz -C unity-extracted/ --strip-components=2

    - name: Compute checksum
      id: checksum
      shell: bash
      run: |
        CHECKSUM=$(sha256sum unity-build/calculon.tar.gz | awk '{print $1}')
        echo "unity_checksum=$CHECKSUM" >> "$GITHUB_OUTPUT"

    - uses: appleboy/scp-action@917f8b81dfc1ccd331fef9e2d61bdc6c8be94634 # v0.1.7
      with:
        host: ${{ inputs.host }}
        username: ${{ inputs.username }}
        key: ${{ inputs.ssh_key }}
        source: unity-extracted/Calculon
        target: /var/www/magic-nugger/web-app/
        strip_components: 1
