name: Configure server
description: One-time nginx config + Certbot SSL. Reconfigures automatically when domain changes.

inputs:
  host:
    required: true
  username:
    required: true
  ssh_key:
    required: true
  domain:
    required: true
  certbot_email:
    required: true

runs:
  using: composite
  steps:
    - uses: appleboy/ssh-action@7eaf76671a0d7eec5d98ee897acda4f968735a17 # v1.2.0
      env:
        DOMAIN: ${{ inputs.domain }}
        CERTBOT_EMAIL: ${{ inputs.certbot_email }}
      with:
        host: ${{ inputs.host }}
        username: ${{ inputs.username }}
        key: ${{ inputs.ssh_key }}
        envs: DOMAIN,CERTBOT_EMAIL
        script: |
          CONFIGURED_DOMAIN=$(cat /etc/nginx/.configured-domain 2>/dev/null || echo "")

          if [ "$CONFIGURED_DOMAIN" != "$DOMAIN" ]; then
            if [ -n "$CONFIGURED_DOMAIN" ]; then
              certbot delete --cert-name "$CONFIGURED_DOMAIN" --non-interactive || true
            fi

            systemctl stop nginx || true
            certbot certonly --standalone -d "$DOMAIN" --non-interactive --agree-tos -m "$CERTBOT_EMAIL"

            mkdir -p /etc/letsencrypt/renewal-hooks/pre /etc/letsencrypt/renewal-hooks/post
            printf '#!/bin/bash\nsystemctl stop nginx\n' > /etc/letsencrypt/renewal-hooks/pre/nginx-stop.sh
            printf '#!/bin/bash\nsystemctl start nginx\n' > /etc/letsencrypt/renewal-hooks/post/nginx-start.sh
            chmod +x /etc/letsencrypt/renewal-hooks/pre/nginx-stop.sh /etc/letsencrypt/renewal-hooks/post/nginx-start.sh

            cp /magic-nugger/nginx/frontend.nginx.conf /etc/nginx/nginx.conf
            sed -i "s/your-domain\.com/$DOMAIN/g" /etc/nginx/nginx.conf

            echo "$DOMAIN" > /etc/nginx/.configured-domain
          fi

          nginx -t && systemctl start nginx
