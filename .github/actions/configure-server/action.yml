name: Configure server
description: One-time nginx config + Certbot SSL. Skips each step if already done.

inputs:
  host:
    required: true
  username:
    required: true
  ssh_key:
    required: true
  domain:
    required: true
  certbot_email:
    required: true

runs:
  using: composite
  steps:
    - uses: appleboy/ssh-action@7eaf76671a0d7eec5d98ee897acda4f968735a17 # v1.2.0
      env:
        DOMAIN: ${{ inputs.domain }}
        CERTBOT_EMAIL: ${{ inputs.certbot_email }}
      with:
        host: ${{ inputs.host }}
        username: ${{ inputs.username }}
        key: ${{ inputs.ssh_key }}
        envs: DOMAIN,CERTBOT_EMAIL
        script: |
          if [ ! -f /etc/nginx/.magic-nugger-configured ]; then
            cp /magic-nugger/nginx/frontend.nginx.conf /etc/nginx/nginx.conf
            sed -i "s/your-domain\.com/$DOMAIN/g" /etc/nginx/nginx.conf
            # Remove ssl from listen directive so nginx can start before certs exist
            sed -i 's/listen 443 ssl/listen 443/' /etc/nginx/nginx.conf
            nginx -t && systemctl restart nginx
            touch /etc/nginx/.magic-nugger-configured
          fi

          if [ ! -f "/etc/letsencrypt/live/$DOMAIN/fullchain.pem" ]; then
            # certbot --nginx gets the cert and adds ssl back to the config
            certbot --nginx -d "$DOMAIN" --non-interactive --agree-tos -m "$CERTBOT_EMAIL"
          fi
