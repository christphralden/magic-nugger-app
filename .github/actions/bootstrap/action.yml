name: Bootstrap
description: One-time server setup. Skips if /root/.magic-nugger-bootstrapped exists.

inputs:
  host:
    required: true
  username:
    required: true
  ssh_key:
    required: true

runs:
  using: composite
  steps:
    - uses: appleboy/ssh-action@7eaf76671a0d7eec5d98ee897acda4f968735a17 # v1.2.0
      with:
        host: ${{ inputs.host }}
        username: ${{ inputs.username }}
        key: ${{ inputs.ssh_key }}
        timeout: 10m
        command_timeout: 10m
        script: |
          if [ -f /root/.magic-nugger-bootstrapped ]; then
            echo "Already bootstrapped, skipping."
            exit 0
          fi
          echo "==> apt update && upgrade"
          apt update && apt upgrade -y
          echo "==> installing docker"
          apt install -y docker.io docker-compose-v2
          echo "==> installing nginx, certbot, jq"
          apt install -y nginx certbot python3-certbot-nginx jq
          echo "==> enabling nginx"
          systemctl enable nginx
          echo "==> installing node 20"
          curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
          apt install -y nodejs
          echo "==> creating web-app directory"
          mkdir -p /var/www/magic-nugger/web-app
          touch /root/.magic-nugger-bootstrapped
          echo "==> bootstrap complete"
