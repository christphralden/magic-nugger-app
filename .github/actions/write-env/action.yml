name: Write env file
description: Writes /magic-nugger/.env.production on the server from secrets and variables.

inputs:
  host:
    required: true
  username:
    required: true
  ssh_key:
    required: true
  postgres_user:
    required: true
  postgres_password:
    required: true
  postgres_db:
    required: true
  postgres_host:
    required: true
  app_user:
    required: true
  app_user_password:
    required: true
  app_ro_user:
    required: true
  app_ro_password:
    required: true
  session_secret:
    required: true
  google_client_id:
    required: true
  google_client_secret:
    required: true
  cors_origin:
    required: true
  port:
    required: true
  rpm_limit:
    required: true
  db_pool_max:
    required: true
  db_pool_idle_timeout_ms:
    required: true
  db_pool_connection_timeout_ms:
    required: true
  db_query_timeout_ms:
    required: true
  db_ssl_mode:
    required: true

runs:
  using: composite
  steps:
    - uses: appleboy/ssh-action@7eaf76671a0d7eec5d98ee897acda4f968735a17 # v1.2.0
      env:
        POSTGRES_USER: ${{ inputs.postgres_user }}
        POSTGRES_PASSWORD: ${{ inputs.postgres_password }}
        POSTGRES_DB: ${{ inputs.postgres_db }}
        POSTGRES_HOST: ${{ inputs.postgres_host }}
        APP_USER: ${{ inputs.app_user }}
        APP_USER_PASSWORD: ${{ inputs.app_user_password }}
        APP_RO_USER: ${{ inputs.app_ro_user }}
        APP_RO_PASSWORD: ${{ inputs.app_ro_password }}
        SESSION_SECRET: ${{ inputs.session_secret }}
        GOOGLE_CLIENT_ID: ${{ inputs.google_client_id }}
        GOOGLE_CLIENT_SECRET: ${{ inputs.google_client_secret }}
        CORS_ORIGIN: ${{ inputs.cors_origin }}
        PORT: ${{ inputs.port }}
        RPM_LIMIT: ${{ inputs.rpm_limit }}
        DB_POOL_MAX: ${{ inputs.db_pool_max }}
        DB_POOL_IDLE_TIMEOUT_MS: ${{ inputs.db_pool_idle_timeout_ms }}
        DB_POOL_CONNECTION_TIMEOUT_MS: ${{ inputs.db_pool_connection_timeout_ms }}
        DB_QUERY_TIMEOUT_MS: ${{ inputs.db_query_timeout_ms }}
        DB_SSL_MODE: ${{ inputs.db_ssl_mode }}
      with:
        host: ${{ inputs.host }}
        username: ${{ inputs.username }}
        key: ${{ inputs.ssh_key }}
        envs: POSTGRES_USER,POSTGRES_PASSWORD,POSTGRES_DB,POSTGRES_HOST,APP_USER,APP_USER_PASSWORD,APP_RO_USER,APP_RO_PASSWORD,SESSION_SECRET,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,CORS_ORIGIN,PORT,RPM_LIMIT,DB_POOL_MAX,DB_POOL_IDLE_TIMEOUT_MS,DB_POOL_CONNECTION_TIMEOUT_MS,DB_QUERY_TIMEOUT_MS,DB_SSL_MODE
        script: |
          {
            printf 'POSTGRES_USER=%s\n'                   "$POSTGRES_USER"
            printf 'POSTGRES_PASSWORD=%s\n'               "$POSTGRES_PASSWORD"
            printf 'POSTGRES_DB=%s\n'                     "$POSTGRES_DB"
            printf 'POSTGRES_HOST=%s\n'                   "$POSTGRES_HOST"
            printf 'APP_USER=%s\n'                        "$APP_USER"
            printf 'APP_USER_PASSWORD=%s\n'               "$APP_USER_PASSWORD"
            printf 'APP_RO_USER=%s\n'                     "$APP_RO_USER"
            printf 'APP_RO_PASSWORD=%s\n'                 "$APP_RO_PASSWORD"
            printf 'SESSION_SECRET=%s\n'                  "$SESSION_SECRET"
            printf 'GOOGLE_CLIENT_ID=%s\n'                "$GOOGLE_CLIENT_ID"
            printf 'GOOGLE_CLIENT_SECRET=%s\n'            "$GOOGLE_CLIENT_SECRET"
            printf 'CORS_ORIGIN=%s\n'                     "$CORS_ORIGIN"
            printf 'NODE_ENV=production\n'
            printf 'PORT=%s\n'                            "$PORT"
            printf 'RPM_LIMIT=%s\n'                       "$RPM_LIMIT"
            printf 'DB_POOL_MAX=%s\n'                     "$DB_POOL_MAX"
            printf 'DB_POOL_IDLE_TIMEOUT_MS=%s\n'         "$DB_POOL_IDLE_TIMEOUT_MS"
            printf 'DB_POOL_CONNECTION_TIMEOUT_MS=%s\n'   "$DB_POOL_CONNECTION_TIMEOUT_MS"
            printf 'DB_QUERY_TIMEOUT_MS=%s\n'             "$DB_QUERY_TIMEOUT_MS"
            printf 'DB_SSL_MODE=%s\n'                     "$DB_SSL_MODE"
          } > /magic-nugger/.env.production
          chmod 600 /magic-nugger/.env.production
