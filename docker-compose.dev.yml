name: magic-nugger-dev

services:
  magic-nugger-postgres:
    extends:
      file: docker-compose.yml
      service: magic-nugger-postgres
    container_name: magic-nugger-postgres-dev

  magic-nugger-web-server:
    extends:
      file: docker-compose.yml
      service: magic-nugger-web-server
    container_name: magic-nugger-web-server-dev
    build:
      target: dev
    volumes:
      - ./web-server:/magic-nugger
      - /magic-nugger/node_modules
    command: npm run dev
    environment:
      NODE_ENV: development
      ENVIRONMENT: local

  magic-nugger-cron:
    build:
      context: ./db/cron
    container_name: magic-nugger-cron-dev
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-magic_nugger}
      POSTGRES_HOST: magic-nugger-postgres-dev
      GAME_SESSION_RESUME_WINDOW_MS: ${GAME_SESSION_RESUME_WINDOW_MS:-1800000}
    depends_on:
      magic-nugger-postgres:
        condition: service_healthy
    volumes:
      - ./db/backups:/backups
    command: sh -c "crontab /app/crontab && crond -f -d 8"

volumes:
  postgres_data:
    name: magic-nugger-postgres-data-dev
