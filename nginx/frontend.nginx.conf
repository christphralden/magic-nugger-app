user nginx;
worker_processes auto;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="upstream_connect_time" '
                    'urt="upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    keepalive_timeout 65;
    keepalive_requests 1000;

    server_tokens off;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    client_max_body_size 10m;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

    # Upstream Express server
    upstream api {
        server 127.0.0.1:3000;
        keepalive 64;
    }

    # HTTP: ACME challenge passthrough + redirect to HTTPS
    # Certbot fills in the 443 block below with ssl_certificate paths on first run.
    server {
        listen 80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name your-domain.com; # replace with actual domain (or let Certbot set it)

        # Certbot inserts ssl_certificate and ssl_certificate_key here.

        root /var/www/magic-nugger/web-app;
        index index.html;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # CSP — 'unsafe-eval' removed; add it back only if a Unity WebGL build requires it.
        set $csp_default_src "'self'";
        set $csp_script_src "'self' blob:";
        set $csp_style_src "'self'";
        set $csp_font_src "'self' data:";
        set $csp_img_src "'self' data: blob:";
        set $csp_connect_src "'self'";
        set $csp_frame_src "'self' blob:";
        set $csp_worker_src "'self' blob:";
        set $csp_base_uri "'self'";
        set $csp_form_action "'self'";

        add_header Content-Security-Policy "default-src ${csp_default_src}; script-src ${csp_script_src}; style-src ${csp_style_src}; font-src ${csp_font_src}; img-src ${csp_img_src}; connect-src ${csp_connect_src}; frame-src ${csp_frame_src}; worker-src ${csp_worker_src}; base-uri ${csp_base_uri}; form-action ${csp_form_action};" always;

        # Proxy defaults
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header X-Powered-By;

        # Auth endpoints get stricter rate limit
        location /api/v1/auth/ {
            limit_req zone=auth burst=5 nodelay;

            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;

            add_header Cache-Control "no-store, no-cache, max-age=0, must-revalidate" always;
        }

        # API proxy
        location /api/ {
            limit_req zone=api burst=30 nodelay;

            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;

            add_header Cache-Control "no-store, no-cache, max-age=0, must-revalidate" always;
        }

        # Health check — no rate limit, no auth
        location /health {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_connect_timeout 5s;
            proxy_read_timeout 5s;
            access_log off;
        }

        # Static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable" always;
            access_log off;
        }

        # Unity WebGL build artifacts
        location ~* \.(data|wasm|mem|unityweb|js|json)$ {
            expires 1y;
            add_header Cache-Control "public, immutable" always;
            access_log off;
        }

        # HTML (never cache)
        location ~* \.html$ {
            add_header Cache-Control "no-store, no-cache, max-age=0, must-revalidate" always;
        }

        # SPA fallback
        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-store, no-cache, max-age=0, must-revalidate" always;
        }
    }
}
